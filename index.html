<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#09011b,#2d0b59,#ff0080);
height:100vh;
overflow-y:auto;
display:flex;
justify-content:flex-start;
align-items:flex-start;
color:white;
}

.hero{
text-align:center;
z-index:5;
}

h1{
font-size:70px;
margin-bottom:20px;
text-shadow:0 0 20px hotpink;
animation:fade 2s;
}

h2{
font-size:28px;
font-weight:300;
margin-bottom:30px;
}

button{
padding:18px 45px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4fa3;
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
}
100%{
transform:translateY(110vh);
}
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>

</head>

<body>

</button>

</div>

h.style.animationDuration=(4+Math.random()*6)+"s";
